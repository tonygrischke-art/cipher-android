build:
  maxIssues: 0

complexity:
  LongMethod:
    threshold: 300
  LongParameterList:
    functionThreshold: 9
  TooManyFunctions:
    thresholdInFiles: 25
    thresholdInClasses: 25
  CyclomaticComplexMethod:
    threshold: 20
  NestedBlockDepth:
    threshold: 6

style:
  MagicNumber:
    active: false
  WildcardImport:
    active: true

formatting:
  active: true
  android: true
  autoCorrect: false
