build:
  maxIssues: 0

complexity:
  LongMethod:
    threshold: 300
  LongParameterList:
    functionThreshold: 10
    constructorThreshold: 10
  TooManyFunctions:
    thresholdInFiles: 25
    thresholdInClasses: 25
    thresholdInObjects: 25
  CyclomaticComplexMethod:
    threshold: 25
  NestedBlockDepth:
    threshold: 6

exceptions:
  TooGenericExceptionCaught:
    active: false
  SwallowedException:
    active: false

empty-blocks:
  EmptyFunctionBlock:
    active: false

style:
  MagicNumber:
    active: false
  WildcardImport:
    active: true

formatting:
  active: true
  android: true
  autoCorrect: false
